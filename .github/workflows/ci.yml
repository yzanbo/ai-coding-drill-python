# ======================================================================
# GitHub Actions ワークフロー定義ファイル
# 現状の job：commitlint + apps/api（Python）品質ゲート 5 種
# ======================================================================
#
# 設計方針：
#   - 全 job は `jdx/mise-action` で mise を起動し、`mise.toml` の [tools] に従って
#     全ツール（python / node / go / uv / pnpm / lefthook / commitlint）を一括インストール（ADR 0039）
#   - tool 版数の SSoT は `mise.toml`。本ファイルでは NODE_VERSION 等を直接持たない
#   - 各言語固有のチェック（biome / ruff / pyright / golangci-lint 等）は app 着手時に
#     `mise run <task>` 経由で本ファイルに job 追加する（ADR 0026 拡張 + ADR 0036 拡張）
#   - 新規 job は `ci-success.needs` に 1 行追加するだけで Required status checks に
#     自動的に組み込まれる（ADR 0031 の umbrella job パターン）
# ----------------------------------------------------------------------

name: CI

on:
  pull_request:
  push:
    branches: [main]

# concurrency: 同一ブランチでの古い実行を自動キャンセル（無料枠節約）。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# permissions: 最小権限の原則。デプロイ系 job 追加時は当該 job に個別追加。
permissions:
  contents: read

jobs:
  # ====================================================================
  # job: commitlint
  #   コミットメッセージが Conventional Commits 規約（commitlint.config.mjs）に従うか検証。
  #   PR では「base..head」、push では「before..after」の範囲を走査する。
  # ====================================================================
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      # actions/checkout: シャロークローン（fetch-depth: 1）。commitlint が必要とする
      # base コミットだけ後続ステップで個別深掘りする方式（所要時間が累積コミット数に依存しない）。
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # jdx/mise-action: mise.toml の [tools] を読んで全ツールを一括インストール（ADR 0039）。
      # 本 job では特に commitlint（npm:@commitlint/cli）が必要。lefthook は CI では使わないが、
      # mise install は tools 全体を取得する（キャッシュ済みなら高速）。
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # ──────────────────────────────────────────────────────────────
      # 経路 A：pull_request イベント時（PR レビューでの検証）
      #   範囲: base.sha .. head.sha
      #
      # 取得方針（iterative deepen）：
      #   - actions/checkout の depth=1 では base.sha と PR コミット群が手元に無く、
      #     `git log base..head` が "Invalid revision range" で失敗する
      #   - GitHub Git プロトコル制約により `--shallow-exclude=<sha>` も使えない
      #     ("fatal: expected 'acknowledgments'"、ADR 0030 で実証済み)
      #   - そこで `git cat-file -e` で base.sha 到達を確認できるまで `--deepen=20` を反復
      #   - 取得量は PR コミット数を 20 単位で切り上げた値、運用期間に依存しない
      #   - 最大 10 回（200 コミット）で打ち切り fail-fast（暴走防止）
      # ──────────────────────────────────────────────────────────────

      - name: "[PR] Deepen until base reachable"
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          for _ in $(seq 1 10); do
            if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              exit 0
            fi
            git fetch --no-tags --deepen=20 origin
          done
          echo "::error::base.sha (${BASE_SHA}) not reachable after 10 deepen rounds (200 commits)"
          exit 1

      - name: "[PR] Validate commits"
        if: github.event_name == 'pull_request'
        run: |
          commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}"

      # ──────────────────────────────────────────────────────────────
      # 経路 B：push イベント時（main への push 後の事後検証）
      #   範囲: before .. after
      #
      #   `before == 0000...` は初回 push（ブランチ作成と同時）の検出条件。
      #   通常 main への push ではこの分岐は通らない。
      # ──────────────────────────────────────────────────────────────

      - name: "[push] Deepen until before reachable"
        if: >-
          github.event_name == 'push' &&
          github.event.before != '0000000000000000000000000000000000000000'
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          for _ in $(seq 1 10); do
            if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              exit 0
            fi
            git fetch --no-tags --deepen=20 origin
          done
          echo "::error::before SHA (${BEFORE_SHA}) not reachable after 10 deepen rounds (200 commits)"
          exit 1

      - name: "[push] Validate commits"
        if: >-
          github.event_name == 'push' &&
          github.event.before != '0000000000000000000000000000000000000000'
        run: |
          commitlint \
            --from "${{ github.event.before }}" \
            --to "${{ github.event.after }}"

  # ====================================================================
  # 各言語固有のチェックジョブ（biome / typecheck / knip / ruff / pyright /
  # pip-audit / deptry / golangci-lint / pytest / vitest / go test 等）は、
  # 各 app 着手時に `mise run <task>` 経由で本ファイルに追加する（ADR 0026 拡張 + ADR 0036 拡張 + ADR 0039）。
  # 起動テンプレ：
  #
  #   <job-name>:
  #     name: <job-name>
  #     runs-on: ubuntu-latest
  #     steps:
  #       - uses: actions/checkout@<sha> # vX.Y.Z
  #       - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
  #       - run: mise run <task>
  #
  # 追加する job は `ci-success.needs` にも 1 行加えることで Required status checks の
  # 網に自動で組み込まれる（ADR 0031 の umbrella job パターン）。

  # ====================================================================
  # apps/api（Python / FastAPI）品質ゲート — ADR 0020 / 0026 / 0034 / 0035 / 0037 / 0038
  # ----------------------------------------------------------------------
  # 5 ジョブ構成：
  #   - api-lint        : ruff check（lint + format 検証）
  #   - api-typecheck   : pyright（型）
  #   - api-audit       : pip-audit（脆弱性）
  #   - api-deps-check  : deptry（依存衛生）
  #   - api-test        : pytest（unit + integration、Postgres service 付き）
  #
  # api-test を CI に入れる理由：pre-push hook（lefthook）を `--no-verify` 等で
  # バイパスされた場合の最後の砦。hook と CI の二重防御で「ローカル緑 = 全テスト通過」
  # の保証を hook bypass 時にもリモートで再現する。
  # ====================================================================

  api-lint:
    name: api-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:lint

  api-typecheck:
    name: api-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:typecheck

  api-audit:
    name: api-audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:audit

  api-deps-check:
    name: api-deps-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:deps-check

  # api-test は GitHub Actions の services 機能で Postgres を立てる（ローカルの
  # docker-compose とは別レイヤ、CI 専用）。version は docker-compose.yml と揃える
  # 運用：docker-compose.yml の image tag を更新したら本ファイルも追従する。
  # （次フェーズで CI の Postgres / Redis service を docker-compose と同期させる
  # 仕組みを検討する。R0 では手動同期で許容）
  api-test:
    name: api-test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: ai_coding_drill
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_coding_drill"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5432/ai_coding_drill
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:db-migrate
      - run: mise run api:test

  # ====================================================================
  # apps/web（TypeScript / Next.js）品質ゲート — ADR 0018 / 0021 / 0024 / 0026 / 0036 / 0038
  # ----------------------------------------------------------------------
  # 5 ジョブ構成：
  #   - web-lint        : Biome check（lint + format 検証）
  #   - web-typecheck   : tsc --noEmit（型）
  #   - web-knip        : Knip（未使用 export / file / dep 検出）
  #   - web-syncpack    : syncpack lint（package.json 整合性）
  #   - web-test        : vitest run（passWithNoTests で R0 は no-op、R1 以降で本格動作）
  #
  # 各ジョブは `mise install`（jdx/mise-action）で pnpm を含む全ツールを取得した後、
  # `mise run web:<task>` を呼ぶ。`mise install` が pnpm を入れるため pnpm/action-setup は不要。
  #
  # web-test を CI に入れる理由は api-test と同じ：pre-push hook を `--no-verify` 等で
  # バイパスされた場合の最後の砦。hook と CI の二重防御。
  # ====================================================================

  web-lint:
    name: web-lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:lint

  web-typecheck:
    name: web-typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:typecheck

  web-knip:
    name: web-knip
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:knip

  web-syncpack:
    name: web-syncpack
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:syncpack

  web-test:
    name: web-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:test

  # ====================================================================
  # 【集約ジョブ】ci-success（umbrella / aggregator）
  #   ブランチ保護（Ruleset）の Required status checks には、このジョブ 1 つだけを
  #   登録すれば足りる：
  #     - 新規 job 追加は `needs:` への 1 行追加で Required 網に組込
  #     - ジョブ名リネームでも Ruleset 側 status check 名は不変
  #     - skip / cancelled / failure を `if: always()` で正しく失敗扱いにする
  # ====================================================================
  ci-success:
    name: ci-success
    if: always()
    needs:
      - commitlint
      - api-lint
      - api-typecheck
      - api-audit
      - api-deps-check
      - api-test
      - web-lint
      - web-typecheck
      - web-knip
      - web-syncpack
      - web-test
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'skipped') }}" == "true" ]]; then
            echo "::error::One or more required jobs did not succeed"
            echo "results: ${{ join(needs.*.result, ', ') }}"
            exit 1
          fi
          echo "All required jobs succeeded"
