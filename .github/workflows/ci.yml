# ======================================================================
# GitHub Actions ワークフロー定義ファイル
# 現状の job：commitlint + apps/api（Python）品質ゲート 5 種
# ======================================================================
#
# 設計方針：
#   - 全 job は `jdx/mise-action` で mise を起動し、`mise.toml` の [tools] に従って
#     全ツール（python / node / go / uv / pnpm / lefthook / commitlint）を一括インストール（ADR 0039）
#   - tool 版数の SSoT は `mise.toml`。本ファイルでは NODE_VERSION 等を直接持たない
#   - 各言語固有のチェック（biome / ruff / pyright / golangci-lint 等）は app 着手時に
#     `mise run <task>` 経由で本ファイルに job 追加する（ADR 0026 拡張 + ADR 0036 拡張）
#   - 新規 job は `ci-success.needs` に 1 行追加するだけで Required status checks に
#     自動的に組み込まれる（ADR 0031 の umbrella job パターン）
# ----------------------------------------------------------------------

name: CI

on:
  pull_request:
  push:
    branches: [main]

# concurrency: 同一ブランチでの古い実行を自動キャンセル（無料枠節約）。
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

# permissions: 最小権限の原則。デプロイ系 job 追加時は当該 job に個別追加。
permissions:
  contents: read
  pull-requests: read  # dorny/paths-filter が pull_request イベントで変更ファイル一覧を取得するため

jobs:
  # ====================================================================
  # job: changes — path-based 条件起動の元データ
  #   PR / push で変更されたパスを検出し、後続 job を条件起動する。
  #   全 PR で全 job を走らせるのは無駄（apps/api だけ変えた PR で apps/web の
  #   CI が走るのは Actions 分の浪費）。各 job は自身のスコープに該当する
  #   パスが変わった時 + 共有 artifact / 設定が変わった時のみ走る。
  #
  #   commitlint と ci-success は changes に依存せず常時起動（commitlint は
  #   どんな PR でも message を検証、ci-success は umbrella ジョブとして必須）。
  # ====================================================================
  changes:
    name: changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      grading: ${{ steps.filter.outputs.grading }}
      generation: ${{ steps.filter.outputs.generation }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        id: filter
        with:
          filters: |
            # apps/api/ 配下の変更（Pydantic / routers / models 等、Backend ロジック）
            api:
              - 'apps/api/**'
            # apps/web/ 配下の変更（Next.js / components / lib 等、Frontend ロジック）
            web:
              - 'apps/web/**'
            # apps/workers/grading/ 配下の変更（採点 Worker、Go）
            grading:
              - 'apps/workers/grading/**'
            # apps/workers/generation/ 配下の変更（問題生成 Worker、Go）
            generation:
              - 'apps/workers/generation/**'
            # 横断設定 / CI 自身の変更 — 全 job を走らせる安全側のトリガ：
            #   - mise.toml: tool 版数の変更（全言語のビルド / テスト結果に影響）
            #   - .github/workflows/**: CI 設定自身の変更（filter の動作確認も含む）
            #
            # 含めない（CI 結果に影響しないため）：
            #   - lefthook.yml: ローカル pre-commit / pre-push の設定のみ。
            #     CI のテスト・ビルド・lint は mise タスクを直接呼んでおり、
            #     lefthook.yml の差分は CI の判定結果を一切変えない。
            #     かつて shared に含めて全 job を trigger していたが、
            #     lefthook-only PR で web-* / api-* / worker-* が無意味に走る指摘により外した。
            #   - commitlint.config.mjs: commitlint job のみが読む。
            #     scope / type の追加は commit メッセージ検証にしか影響しないため、
            #     コードの lint / test には無関係。
            #   - .github/dependabot.yml: PR 生成スケジュールの設定のみ。CI 実行内容に無関係。
            shared:
              - 'mise.toml'
              - '.github/workflows/**'

  # ====================================================================
  # job: commitlint
  #   コミットメッセージが Conventional Commits 規約（commitlint.config.mjs）に従うか検証。
  #   PR では「base..head」、push では「before..after」の範囲を走査する。
  # ====================================================================
  commitlint:
    name: commitlint
    runs-on: ubuntu-latest
    steps:
      # actions/checkout: シャロークローン（fetch-depth: 1）。commitlint が必要とする
      # base コミットだけ後続ステップで個別深掘りする方式（所要時間が累積コミット数に依存しない）。
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      # jdx/mise-action: mise.toml の [tools] を読んで全ツールを一括インストール（ADR 0039）。
      # 本 job では特に commitlint（npm:@commitlint/cli）が必要。lefthook は CI では使わないが、
      # mise install は tools 全体を取得する（キャッシュ済みなら高速）。
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1

      # ──────────────────────────────────────────────────────────────
      # 経路 A：pull_request イベント時（PR レビューでの検証）
      #   範囲: base.sha .. head.sha
      #
      # 取得方針（iterative deepen）：
      #   - actions/checkout の depth=1 では base.sha と PR コミット群が手元に無く、
      #     `git log base..head` が "Invalid revision range" で失敗する
      #   - GitHub Git プロトコル制約により `--shallow-exclude=<sha>` も使えない
      #     ("fatal: expected 'acknowledgments'"、ADR 0030 で実証済み)
      #   - そこで `git cat-file -e` で base.sha 到達を確認できるまで `--deepen=20` を反復
      #   - 取得量は PR コミット数を 20 単位で切り上げた値、運用期間に依存しない
      #   - 最大 10 回（200 コミット）で打ち切り fail-fast（暴走防止）
      # ──────────────────────────────────────────────────────────────

      - name: "[PR] Deepen until base reachable"
        if: github.event_name == 'pull_request'
        run: |
          BASE_SHA="${{ github.event.pull_request.base.sha }}"
          for _ in $(seq 1 10); do
            if git cat-file -e "${BASE_SHA}^{commit}" 2>/dev/null; then
              exit 0
            fi
            git fetch --no-tags --deepen=20 origin
          done
          echo "::error::base.sha (${BASE_SHA}) not reachable after 10 deepen rounds (200 commits)"
          exit 1

      - name: "[PR] Validate commits"
        if: github.event_name == 'pull_request'
        run: |
          commitlint \
            --from "${{ github.event.pull_request.base.sha }}" \
            --to "${{ github.event.pull_request.head.sha }}"

      # ──────────────────────────────────────────────────────────────
      # 経路 B：push イベント時（main への push 後の事後検証）
      #   範囲: before .. after
      #
      #   `before == 0000...` は初回 push（ブランチ作成と同時）の検出条件。
      #   通常 main への push ではこの分岐は通らない。
      # ──────────────────────────────────────────────────────────────

      - name: "[push] Deepen until before reachable"
        if: >-
          github.event_name == 'push' &&
          github.event.before != '0000000000000000000000000000000000000000'
        run: |
          BEFORE_SHA="${{ github.event.before }}"
          for _ in $(seq 1 10); do
            if git cat-file -e "${BEFORE_SHA}^{commit}" 2>/dev/null; then
              exit 0
            fi
            git fetch --no-tags --deepen=20 origin
          done
          echo "::error::before SHA (${BEFORE_SHA}) not reachable after 10 deepen rounds (200 commits)"
          exit 1

      - name: "[push] Validate commits"
        if: >-
          github.event_name == 'push' &&
          github.event.before != '0000000000000000000000000000000000000000'
        run: |
          commitlint \
            --from "${{ github.event.before }}" \
            --to "${{ github.event.after }}"

  # ====================================================================
  # 各言語固有のチェックジョブ（biome / typecheck / knip / ruff / pyright /
  # pip-audit / deptry / golangci-lint / pytest / vitest / go test 等）は、
  # 各 app 着手時に `mise run <task>` 経由で本ファイルに追加する（ADR 0026 拡張 + ADR 0036 拡張 + ADR 0039）。
  # 起動テンプレ：
  #
  #   <job-name>:
  #     name: <job-name>
  #     runs-on: ubuntu-latest
  #     steps:
  #       - uses: actions/checkout@<sha> # vX.Y.Z
  #       - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
  #       - run: mise run <task>
  #
  # 追加する job は `ci-success.needs` にも 1 行加えることで Required status checks の
  # 網に自動で組み込まれる（ADR 0031 の umbrella job パターン）。

  # ====================================================================
  # apps/api（Python / FastAPI）品質ゲート — ADR 0020 / 0026 / 0034 / 0035 / 0037 / 0038
  # ----------------------------------------------------------------------
  # 5 ジョブ構成：
  #   - api-lint        : ruff check（lint + format 検証）
  #   - api-typecheck   : pyright（型）
  #   - api-audit       : pip-audit（脆弱性）
  #   - api-deps-check  : deptry（依存衛生）
  #   - api-test        : pytest（unit + integration、Postgres service 付き）
  #
  # api-test を CI に入れる理由：pre-push hook（lefthook）を `--no-verify` 等で
  # バイパスされた場合の最後の砦。hook と CI の二重防御で「ローカル緑 = 全テスト通過」
  # の保証を hook bypass 時にもリモートで再現する。
  # ====================================================================

  api-lint:
    name: api-lint
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:lint

  api-typecheck:
    name: api-typecheck
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:typecheck

  api-audit:
    name: api-audit
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:audit

  api-deps-check:
    name: api-deps-check
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:deps-check

  # api-test は GitHub Actions の services 機能で Postgres を立てる（ローカルの
  # docker-compose とは別レイヤ、CI 専用）。version は docker-compose.yml と揃える
  # 運用：docker-compose.yml の image tag を更新したら本ファイルも追従する。
  # （次フェーズで CI の Postgres / Redis service を docker-compose と同期させる
  # 仕組みを検討する。R0 では手動同期で許容）
  api-test:
    name: api-test
    needs: changes
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    services:
      # テスト用 Postgres。docker-compose.test.yml と同じ「ホスト :5433 / DB 名末尾 _test」に揃える。
      # これにより local（mise run api:test → test:up）と CI（services）で
      # DATABASE_URL が完全一致し、conftest.py の suffix guard が両環境で同じ挙動を取る（issue #86）。
      postgres-test:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: ai_coding_drill_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_coding_drill_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # workflow env で DATABASE_URL をテスト DB に向ける。Alembic / pytest 双方が読む。
      # local の docker-compose.test.yml と同じ port / DB 名（issue #86）。
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/ai_coding_drill_test
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      # Alembic を workflow env DATABASE_URL（:5433/ai_coding_drill_test）に対して流す。
      - run: mise run api:db-migrate
      # `mise run api:test` を直接呼ばない理由：
      #   api:test は depends = ["test:up"] で `docker compose -f docker-compose.test.yml up`
      #   を起動するが、CI ではすでに services.postgres-test が :5433 を専有しているため
      #   compose の port bind が衝突する。services と docker compose の二重起動を避けるため、
      #   web-e2e ジョブが `pnpm exec playwright test` を直接呼ぶのと同じ流儀で、
      #   ここも `uv run pytest` を直接呼ぶ。
      # 安全性：conftest.py が DATABASE_URL の `_test` suffix を検証して dev DSN を弾くため、
      #   workflow env 経由でも dev DB 接続事故は構造的に起きない。
      - run: cd apps/api && mise exec -- uv run pytest

  # ====================================================================
  # apps/web（TypeScript / Next.js）品質ゲート — ADR 0018 / 0021 / 0024 / 0026 / 0036 / 0038
  # ----------------------------------------------------------------------
  # 5 ジョブ構成：
  #   - web-lint        : Biome check（lint + format 検証）
  #   - web-typecheck   : tsc --noEmit（型）
  #   - web-knip        : Knip（未使用 export / file / dep 検出）
  #   - web-syncpack    : syncpack lint（package.json 整合性）
  #   - web-test        : vitest run（passWithNoTests で R0 は no-op、R1 以降で本格動作）
  #
  # 各ジョブは `mise install`（jdx/mise-action）で pnpm を含む全ツールを取得した後、
  # `mise run web:<task>` を呼ぶ。`mise install` が pnpm を入れるため pnpm/action-setup は不要。
  #
  # web-test を CI に入れる理由は api-test と同じ：pre-push hook を `--no-verify` 等で
  # バイパスされた場合の最後の砦。hook と CI の二重防御。
  # ====================================================================

  web-lint:
    name: web-lint
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:lint

  web-typecheck:
    name: web-typecheck
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:typecheck

  web-knip:
    name: web-knip
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:knip

  web-syncpack:
    name: web-syncpack
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:syncpack

  web-test:
    name: web-test
    needs: changes
    if: ${{ needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run web:test

  # apps/web の Playwright E2E（authentication.md 受け入れ条件のうちブラウザ間通信 /
  # Frontend side effect / DB 永続化レベルの 7 シナリオ、apps/web/e2e/auth.spec.ts）。
  #
  # 起動条件：web / api / grading / shared のいずれか変更時。
  #   - web/     : E2E テスト本体 / Playwright config の変更
  #   - api/     : OAuth callback handler / Settings / DB schema の変更
  #   - grading/ : worker 側の .env / DATABASE_URL 形式変更等で api 起動が壊れる経路が
  #                実証されている (0de2795 fix(worker,config))。worker を起動条件に含めて
  #                同類の regression を E2E で捕捉する
  #   - shared / mise.toml: 横断設定変更
  #
  # web-test と分ける理由：
  #   - Playwright は Postgres / Redis service + chromium ブラウザ install が必要で
  #     Vitest と比べ重い（pnpm install + browser DL + 3 サーバ起動）。job を分離して
  #     Vitest だけの PR が遅くならないようにする
  #   - Playwright の失敗時 trace を artifact upload するため独立した job を保持
  web-e2e:
    name: web-e2e
    needs: changes
    if: >-
      ${{ needs.changes.outputs.web == 'true' ||
          needs.changes.outputs.api == 'true' ||
          needs.changes.outputs.grading == 'true' ||
          needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    services:
      # テスト用 Postgres。docker-compose.test.yml と同じ「ホスト :5433 / DB 名末尾 _test」に揃える。
      # これにより local と CI で DATABASE_URL が完全一致し、/_test/reset の安全ガード
      # （DB 名 `_test` allowlist）が両環境で同じ挙動を取る（issue #86）。
      postgres-test:
        image: postgres:18.3-alpine
        env:
          POSTGRES_DB: ai_coding_drill_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5433:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d ai_coding_drill_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis-test:
        image: redis:8.6-alpine
        ports:
          - 6380:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      # api / worker / mock サーバが共有する DB 接続文字列。
      # playwright.config.ts の webServer.env は workflow env を引き継がず明示注入する。
      # local の docker-compose.test.yml と同じ port / DB 名（issue #86）。
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@localhost:5433/ai_coding_drill_test
      # Redis は port 6380 でポート分離済みなので DB index は /0 で十分。
      # local 既定値（apps/web/e2e/_helpers/constants.ts）と揃えて設定の二重管理を避ける。
      REDIS_URL: redis://localhost:6380/0
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      # DB schema を Alembic で作成（api / mock の /_test/reset が users テーブルを参照）。
      # workflow env の DATABASE_URL を Alembic env.py が読む。
      - run: mise run api:db-migrate
      # Playwright のブラウザバイナリをキャッシュする。
      # cache key には Playwright 自身の version を含めて、version 上がった時に
      # 自動的にキャッシュミスして新バイナリを取り直す。OS にも依存するため runner.os も付ける。
      - name: Resolve Playwright version
        id: playwright-version
        # pnpm exec は stdout に "Lockfile is up to date..." 等の情報行を混ぜることが
        # あるため、`Version X.Y.Z` 行を grep してから抽出する (混入した非バージョン行を
        # cache key に巻き込まないため)。
        run: |
          ver=$(cd apps/web && pnpm exec playwright --version 2>&1 | awk '/^Version/{print $2; exit}')
          if [ -z "$ver" ]; then
            echo "::error::Failed to resolve Playwright version"
            exit 1
          fi
          echo "version=$ver" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.playwright-version.outputs.version }}
      # キャッシュ HIT 時はバイナリは既にある → OS-level deps だけ apt-get で入れる（install-deps）。
      # MISS 時はバイナリ + OS deps を一括取得（--with-deps）。
      - name: Install Playwright (cache miss)
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: cd apps/web && pnpm exec playwright install --with-deps chromium
      - name: Install Playwright OS deps only (cache hit)
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: cd apps/web && pnpm exec playwright install-deps chromium
      # 採点 Worker の Go struct を job-schema から生成（internal/jobtypes/*.go は gitignore 対象で
      # fresh checkout の CI では存在しないため、Worker の go build が失敗する。issue #80）。
      # local の `mise run web:e2e` は depends で同タスクを自動実行する。
      - run: mise run worker:grading:types-gen
      # 採点 Worker のサンドボックス image を先に build（grading-flow.spec.ts が Worker を起動するため、
      # image 不在だと Worker が fail-fast する。issue #80）。buildx + gha cache で
      # 2 回目以降はレイヤキャッシュが効き、毎 CI run の docker build (~30-60s) を圧縮できる。
      # local の `mise run web:e2e` は depends で素の docker build を呼ぶ（docker daemon キャッシュ）。
      - uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      - uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: apps/workers/grading/sandbox
          tags: ai-coding-drill-sandbox:latest
          push: false
          load: true
          cache-from: type=gha,scope=sandbox
          cache-to: type=gha,mode=max,scope=sandbox
      # CI=true で webServer.reuseExistingServer=false / reporter=github / workers=1 /
      # retries=2 が有効になる（playwright.config.ts 参照）。
      - run: cd apps/web && CI=true pnpm exec playwright test
      # 失敗時のみ trace / screenshots を artifact に上げる（成功時はノイズなので不要）。
      - if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-results
          path: |
            apps/web/test-results/
            apps/web/playwright-report/
          retention-days: 7

  # ====================================================================
  # apps/workers/grading（Go）品質ゲート — ADR 0019 / 0026 / 0028 / 0038 / 0040
  # ----------------------------------------------------------------------
  # 4 ジョブ構成：
  #   - worker-grading-lint        : golangci-lint run（lint + gofumpt format 検証）
  #   - worker-grading-test        : go test ./...（unit、R0-8 時点は no test ファイル）
  #   - worker-grading-audit       : govulncheck（脆弱性スキャン）
  #   - worker-grading-deps-check  : go mod tidy 後の go.mod / go.sum 差分検査
  #
  # 各ジョブで `mise install`（jdx/mise-action）で go / golangci-lint / govulncheck を取得した後、
  # `mise run worker:grading:<task>` を呼ぶ。Go 本体含むツールは全て mise.toml が SSoT。
  # ====================================================================

  # lint / test / audit / deps-check のいずれも Go の import 解決を伴う。
  # jobtypes/*.go が存在しないと、internal/grading/ などからの
  # `import "internal/jobtypes"` を go ツールチェインが「ローカル package 空 →
  # 外部 module を fetch」と誤判定してしまう（`go mod tidy -diff` も同様に失敗）。
  # types.go は gitignored（ADR 0006、R0-11）なので、4 ジョブすべての先頭で
  # mise run worker:grading:types-gen を呼んで生成する。types-gen 自身が
  # api:job-schemas-export に depends しているので 1 行で schemas-export + Go 生成が完結。
  worker-grading-lint:
    name: worker-grading-lint
    needs: changes
    if: ${{ needs.changes.outputs.grading == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:grading:types-gen
      - run: mise run worker:grading:lint

  worker-grading-test:
    name: worker-grading-test
    needs: changes
    if: ${{ needs.changes.outputs.grading == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:grading:types-gen
      - run: mise run worker:grading:test

  worker-grading-audit:
    name: worker-grading-audit
    needs: changes
    if: ${{ needs.changes.outputs.grading == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:grading:types-gen
      - run: mise run worker:grading:audit

  worker-grading-deps-check:
    name: worker-grading-deps-check
    needs: changes
    if: ${{ needs.changes.outputs.grading == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:grading:types-gen
      - run: mise run worker:grading:deps-check

  # ====================================================================
  # apps/workers/generation（Go）品質ゲート — ADR 0019 / 0026 / 0028 / 0038 / 0040
  # ----------------------------------------------------------------------
  # grading と同じ 4 ジョブ構成（lint / test / audit / deps-check）を generation 側にも
  # 対称に配置する。両 Worker 独立 Go module（ADR 0040）なので CI も per-Worker。
  # ====================================================================

  # grading 側と同パターン：lint / test / audit の各先頭で types-gen を呼ぶ。
  worker-generation-lint:
    name: worker-generation-lint
    needs: changes
    if: ${{ needs.changes.outputs.generation == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:generation:types-gen
      - run: mise run worker:generation:lint

  worker-generation-test:
    name: worker-generation-test
    needs: changes
    if: ${{ needs.changes.outputs.generation == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:generation:types-gen
      - run: mise run worker:generation:test

  worker-generation-audit:
    name: worker-generation-audit
    needs: changes
    if: ${{ needs.changes.outputs.generation == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:generation:types-gen
      - run: mise run worker:generation:audit

  worker-generation-deps-check:
    name: worker-generation-deps-check
    needs: changes
    if: ${{ needs.changes.outputs.generation == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run worker:generation:types-gen
      - run: mise run worker:generation:deps-check

  # ====================================================================
  # 型同期パイプライン drift 検出 — ADR 0006
  # ----------------------------------------------------------------------
  # Pydantic SSoT を変更したのに 3 artifact（apps/api/openapi.json /
  # apps/api/job-schemas/ / apps/web/src/__generated__/api/）の再生成を
  # 忘れた PR を弾く最終ゲート。lefthook の schemas-drift（pre-commit）が
  # --no-verify でバイパスされた場合の二重防御。
  #
  # 仕組み：
  #   1. mise install で uv / pnpm / quicktype を含む全ツールを取得
  #   2. 3 artifact を SSoT（Pydantic）から再生成
  #   3. git diff --exit-code でコミット済 artifact とズレがあれば fail
  #
  # Worker（Go）側の生成物（apps/workers/<name>/internal/jobtypes/*.go）は
  # gitignore で別管理（ADR 0006、jobtypes/.gitignore）。R0-11 でパイプラインの
  # 「実行可能性」だけ別ジョブ（worker-types-gen）で検証する（drift 検出は不要）。
  # ====================================================================
  types-gen-drift:
    name: types-gen-drift
    needs: changes
    # api / web のどちらかが変わったら drift チェックを走らせる
    # （Pydantic SSoT 変更 or 生成物の手動編集の検出）。shared 変更時も念のため起動。
    if: ${{ needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      - run: mise run api:openapi-export
      - run: mise run api:job-schemas-export
      - run: mise run web:types-gen
      - name: Verify artifacts are in sync with Pydantic SSoT
        run: |
          git diff --exit-code \
            apps/api/openapi.json \
            apps/api/job-schemas/ \
            apps/web/src/__generated__/api/

  # ====================================================================
  # Worker 側型同期パイプライン疎通検証 — ADR 0006、R0-11
  # ----------------------------------------------------------------------
  # apps/api/job-schemas/ → quicktype → apps/workers/<worker>/internal/jobtypes/
  # の両 Worker 分のパイプラインがエラーなく走り、生成 Go ファイルが lint / build
  # に乗ることを確認する。
  #
  # types-gen-drift と分ける理由：Worker 側 jobtypes/*.go は gitignore 対象なので
  # 「commit 済 artifact との差分」概念が無く、検証軸が「実行成否 + 生成物の build
  # 可能性」になる。同居させると job の責務が混ざる。
  #
  # 起動条件：api（schemas が変わる）/ grading / generation / shared の変更時。
  # ====================================================================
  worker-types-gen:
    name: worker-types-gen
    needs: changes
    if: >-
      ${{ needs.changes.outputs.api == 'true' ||
          needs.changes.outputs.grading == 'true' ||
          needs.changes.outputs.generation == 'true' ||
          needs.changes.outputs.shared == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
      # mise run worker:types-gen は depends で api:job-schemas-export + 両 Worker の
      # types-gen を順に走らせる（mise.toml の depends 参照）。
      - run: mise run worker:types-gen
      # 生成 Go が両 Worker で build 可能か確認（vet は lint 同等の軽量チェック）。
      - run: mise exec -- go -C apps/workers/grading vet ./internal/jobtypes/...
      - run: mise exec -- go -C apps/workers/generation vet ./internal/jobtypes/...

  # ====================================================================
  # 【集約ジョブ】ci-success（umbrella / aggregator）
  #   ブランチ保護（Ruleset）の Required status checks には、このジョブ 1 つだけを
  #   登録すれば足りる：
  #     - 新規 job 追加は `needs:` への 1 行追加で Required 網に組込
  #     - ジョブ名リネームでも Ruleset 側 status check 名は不変
  #     - failure / cancelled は失敗扱い、skipped は path-filter による意図的スキップ
  #       なので成功扱い（changes job + 各 job の if: で制御）
  # ====================================================================
  ci-success:
    name: ci-success
    if: always()
    needs:
      - changes
      - commitlint
      - api-lint
      - api-typecheck
      - api-audit
      - api-deps-check
      - api-test
      - web-lint
      - web-typecheck
      - web-knip
      - web-syncpack
      - web-test
      - web-e2e
      - worker-grading-lint
      - worker-grading-test
      - worker-grading-audit
      - worker-grading-deps-check
      - worker-generation-lint
      - worker-generation-test
      - worker-generation-audit
      - worker-generation-deps-check
      - types-gen-drift
      - worker-types-gen
    runs-on: ubuntu-latest
    steps:
      - name: Verify all required jobs succeeded or were intentionally skipped
        run: |
          # path-filter で意図的にスキップされた job（skipped）は OK 扱い。
          # failure / cancelled のみを失敗とみなす。
          # changes job 自体が失敗した場合は他全 job が連鎖的に skipped になるが、
          # その時は needs.*.result に 'failure' が含まれるため検知できる。
          if [[ "${{ contains(needs.*.result, 'failure') }}" == "true" ]] \
             || [[ "${{ contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "::error::One or more required jobs failed or were cancelled"
            echo "results: ${{ join(needs.*.result, ', ') }}"
            exit 1
          fi
          echo "All required jobs succeeded or were intentionally skipped (path-filter)"
          echo "results: ${{ join(needs.*.result, ', ') }}"
