# ======================================================================
# Dependabot 設定（ADR 0028 / 0026 拡張）
# ======================================================================
#
# 役割：
#   依存関係の更新を週次で自動 PR 化する。GitHub Actions の SHA ピン止め（ADR 0027）と
#   組み合わせて運用：
#     1. アクションは SHA + バージョンコメントの形式で固定（不変参照）
#     2. Dependabot が新バージョン検出時に自動 PR で SHA とコメントを更新
#     3. CI（ci.yml）が PR 上で実行され、人間が緑を確認してマージ
#
# 監視対象は ADR 0036 拡張 + ADR 0040 反映後の構造に合わせる：
#   - GitHub Actions：.github/workflows/*.yml と .github/actions/*/action.yml
#   - Python（pip）：apps/api/pyproject.toml + uv.lock（apps/api 着手時に有効化）
#   - npm：apps/web/package.json + pnpm-lock.yaml（apps/web 着手時に有効化）
#   - Go modules：apps/workers/<name>/go.mod（各 Worker 着手時に有効化）
#
# **mise.toml の tool 版数自体は Dependabot 監視対象外**（npm: tool / native binary は
# Dependabot npm/github-actions ecosystem では拾えない）。`mise upgrade` を手動 or
# 別の自動化で対応する（→ ADR 0035 / 0039 の見直しトリガー）。
#
# 公式リファレンス: https://docs.github.com/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
# ----------------------------------------------------------------------

version: 2

updates:
  # ────────────────────────────────────────────────────────────────────
  # GitHub Actions エコシステム
  #   .github/workflows/*.yml と .github/actions/*/action.yml の uses: 行を解析。
  #   SHA ピン止めしているので Dependabot は SHA 文字列とバージョンコメントを
  #   セットで書き換える PR を作る。
  # ────────────────────────────────────────────────────────────────────
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
    # commit-message: commitlint.config.mjs の規約（type(scope): subject）に揃える。
    #   prefix:             production / github-actions 更新 → "build(deps): ..."
    #   prefix-development: devDependencies 更新           → "build(deps-dev): ..."
    #   include: scope      Dependabot が () 内 scope を依存種別から自動決定（deps / deps-dev）
    commit-message:
      prefix: build
      prefix-development: build
      include: scope

  # ────────────────────────────────────────────────────────────────────
  # Python（pip）エコシステム — apps/api（FastAPI / Pydantic / SQLAlchemy 等）
  # ────────────────────────────────────────────────────────────────────
  # apps/api/pyproject.toml + uv.lock を監視対象とする。Dependabot は uv.lock を
  # ネイティブにはまだ完全サポートしないが、PEP 621 の pyproject.toml 経由で
  # production / dev 依存を更新する（uv.lock は Dependabot PR 受領後の rebase 時に
  # `uv lock --upgrade-package <pkg>` で開発者側で同期する運用）。
  - package-ecosystem: pip
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - python
    commit-message:
      prefix: build
      prefix-development: build
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      # FastAPI / Starlette / Pydantic は連動して更新する必要がある
      fastapi:
        patterns:
          - fastapi
          - starlette
          - pydantic
          - pydantic-*
      # SQLAlchemy / Alembic はペアで更新（ADR 0037）
      sqlalchemy:
        patterns:
          - sqlalchemy
          - alembic

  # ────────────────────────────────────────────────────────────────────
  # npm（apps/web）エコシステム
  # ────────────────────────────────────────────────────────────────────
  # apps/web/package.json + apps/web/pnpm-lock.yaml を監視。
  # ADR 0036 拡張により root には package.json が存在しないため、directory は /apps/web。
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Asia/Tokyo
    open-pull-requests-limit: 10
    labels:
      - dependencies
      - npm
    commit-message:
      prefix: build
      prefix-development: build
      include: scope
    ignore:
      - dependency-name: "*"
        update-types:
          - version-update:semver-major
    groups:
      # @types/* は実体コードを伴わない型定義パッケージ
      types:
        patterns:
          - "@types/*"
      # Biome 本体と各プラットフォーム用バイナリはバージョン揃え必須
      biome:
        patterns:
          - "@biomejs/*"
          - biome
      # Hey API（@hey-api/*）は OpenAPI 生成パイプラインの主要ツール（ADR 0006）
      hey-api:
        patterns:
          - "@hey-api/*"
      # Next.js / React は連動更新が必要
      react:
        patterns:
          - react
          - react-*
          - next
      # Playwright 本体とブラウザバイナリ
      playwright:
        patterns:
          - "@playwright/*"
          - playwright
      # Vitest / Testing Library 系はペア更新
      vitest:
        patterns:
          - vitest
          - "@vitest/*"
          - "@vitejs/plugin-react"
          - "@testing-library/*"
          - jsdom

  # ────────────────────────────────────────────────────────────────────
  # Go modules — apps/workers/<name> 着手時に有効化
  # ────────────────────────────────────────────────────────────────────
  # 各 Worker は独立 Go module（ADR 0040）のため、Worker ごとに個別エントリが必要。
  #
  # - package-ecosystem: gomod
  #   directory: /apps/workers/grading
  #   schedule:
  #     interval: weekly
  #     day: monday
  #     time: "06:00"
  #     timezone: Asia/Tokyo
  #   open-pull-requests-limit: 5
  #   labels:
  #     - dependencies
  #     - go
  #   commit-message:
  #     prefix: build
  #     prefix-development: build
  #     include: scope
  #   ignore:
  #     - dependency-name: "*"
  #       update-types:
  #         - version-update:semver-major
  #
  # - package-ecosystem: gomod
  #   directory: /apps/workers/generation
  #   schedule:
  #     interval: weekly
  #     day: monday
  #     time: "06:00"
  #     timezone: Asia/Tokyo
  #   open-pull-requests-limit: 5
  #   labels:
  #     - dependencies
  #     - go
  #   commit-message:
  #     prefix: build
  #     prefix-development: build
  #     include: scope
  #   ignore:
  #     - dependency-name: "*"
  #       update-types:
  #         - version-update:semver-major
