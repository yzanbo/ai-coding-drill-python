# mise 設定ファイル（ADR 0039）
#
# 役割：
#   1. tool 版数管理：Python / Node / Go / uv / pnpm を 1 ファイルで pin（pyenv / nvm / goenv 不採用）
#   2. タスクランナー：3 言語横断のタスクを root から `mise run <task>` で統一起動（cd 不要）
#   3. 環境変数管理：ディレクトリ移動時に自動ロード（[env] / .env）
#
# 起動例：
#   mise install              # tools セクションの全ツールを一括インストール
#   mise run api:test         # apps/api 配下で uv run pytest を実行
#   mise run lint             # 全言語の lint を直列実行
#   mise tasks                # 利用可能タスク一覧（mise CLI 標準）
#
# タスク命名規約：`<scope>:<sub>:<verb>` 階層コロン形式（scope-first）
#   - 単一 scope：`api:test` / `web:lint`
#   - ネスト scope：`worker:grading:dev` / `worker:generation:test`
#   - 横断（root レベル）：`lint` / `test` / `git:clean`
#
# 注意：
#   - apps/<name>/ ディレクトリは実装着手時に作成される。それまで該当タスクは実行時にエラー
#     （定義自体はあるので app 着手時に即起動可能）
#   - root の TS ツーリング（biome / knip / syncpack）は apps/web/ 配下に閉じる方針（ADR 0036）。
#     web:* タスクは apps/web 着手時に有効化される
#   - 詳細な選定根拠は各 ADR を参照（commit メッセージや本ファイル冒頭の ADR 番号から辿れる）

# ============================================================================
# tools — 言語ランタイム + パッケージマネージャ + orchestration ツールの版数 SSoT（ADR 0039）
# ============================================================================
# `mise install` で一括インストール。pyenv / nvm / goenv / volta は不採用、
# package.json も削除済み（root は orchestration 専用層、ADR 0036 拡張）。
[tools]
# --- 言語ランタイム ---
python = "3.14"                                   # apps/api（ADR 0033 / 0034）
node = "24"                                       # apps/web の Frontend（ADR 0036）+ commitlint 用 Node 環境
go = "1.26"                                       # apps/workers/*（ADR 0016 / 0040）

# --- パッケージマネージャ ---
uv = "latest"                                     # Python パッケージ管理（ADR 0035）
pnpm = "latest"                                   # Frontend パッケージ管理（ADR 0036、apps/web 内で使う）

# --- root orchestration ツール（root の package.json を不要にする、ADR 0036 拡張）---
lefthook = "latest"                               # Git フック管理（ADR 0021）。native Go binary
"npm:@commitlint/cli" = "latest"                  # コミットメッセージ検証（ADR 0029）。
                                                  # 注：@commitlint/config-conventional は mise の npm: backend が
                                                  # 別 prefix に展開するため Node module 解決不可。
                                                  # 代わりに commitlint.config.mjs に conventional ルールをインライン展開。

# --- Worker（Go）ツール（ADR 0019 / 0040、R0-8 で追加）---
# go: backend は `go install` 経由で取得する。[tools].go と同じ Go ランタイムが使われる。
# `mise exec -- golangci-lint run` 等で pre-commit / pre-push / CI から起動する。
"go:github.com/golangci/golangci-lint/v2/cmd/golangci-lint" = "latest"  # Go lint メタリンター（ADR 0019）
"go:golang.org/x/vuln/cmd/govulncheck" = "latest"                       # Go 脆弱性スキャン（ADR 0019）

# --- 型同期パイプライン（Job キュー境界）ツール（ADR 0006、R0-11 で追加）---
# quicktype: apps/api/job-schemas/*.schema.json から Go struct を生成する CLI。
# apps/web には入れない（Frontend は OpenAPI 経由で Hey API を使うため不要）。
# mise tools に置くことで Worker dir からも CI からも同一バイナリで起動できる。
"npm:quicktype" = "latest"                                              # JSON Schema → Go 型生成（ADR 0006）

# ============================================================================
# settings
# ============================================================================
[settings]
# Monorepo Tasks 機能（ADR 0039）を含む新機能を有効化
experimental = true

# ============================================================================
# env — ディレクトリ移動時に自動ロードされる環境変数
# ============================================================================
# 各 app の .env は app 自身が読む方針 (env scope 分離):
#   - apps/api/.env: pydantic-settings が SettingsConfigDict(env_file=".env") で
#     cwd 起点に load する (api タスクは dir=apps/api で動くため自然に読める)
#   - apps/workers/grading/.env: cmd/grading/main.go が godotenv.Load() で読む
#
# 過去 mise.toml で `_.file = [api/.env, worker/.env]` を global load していたが、
# 両者で同じ環境変数名 (DATABASE_URL 等) を持つと「後勝ち」で衝突する事故が
# 起きたため、global load を廃止し各 app が自前で .env を読む形に揃えた。

# ============================================================================
# Backend tasks（Python / FastAPI、ADR 0034 / 0035 / 0037 / 0038）
# ----------------------------------------------------------------------------
# apps/api/ 着手時に有効化。pyproject.toml に ruff / pyright / pytest / alembic /
# pip-audit / deptry を devDep として定義する。
# ============================================================================

[tasks."api:dev"]
description = "FastAPI 開発サーバ起動"
dir = "apps/api"
run = "uv run fastapi dev"

[tasks."api:test"]
description = "Backend テスト（pytest + httpx + asyncio）"
dir = "apps/api"
run = "uv run pytest"

[tasks."api:lint"]
description = "Python lint + format 検証（ruff check）"
dir = "apps/api"
run = "uv run ruff check ."

[tasks."api:lint-fix"]
description = "Python lint 自動修正（ruff check --fix、ADR 0021 で参照）"
dir = "apps/api"
run = "uv run ruff check --fix ."

[tasks."api:format"]
description = "Python format 自動修正（ruff format）"
dir = "apps/api"
run = "uv run ruff format ."

[tasks."api:typecheck"]
description = "Python 型チェック（pyright、basic で開始）"
dir = "apps/api"
run = "uv run pyright"

[tasks."api:audit"]
description = "Python 脆弱性スキャン（pip-audit、uv.lock 入力源）"
dir = "apps/api"
run = "uv run pip-audit"

[tasks."api:deps-check"]
description = "Python 依存衛生（deptry：未使用 / 未宣言 / transitive 検出）"
dir = "apps/api"
run = "uv run deptry ."

[tasks."api:openapi-export"]
description = "FastAPI から OpenAPI 3.1 を apps/api/openapi.json に書き出し（HTTP API 境界 artifact、ADR 0006）"
dir = "apps/api"
run = "uv run python -m scripts.export_openapi"

[tasks."api:job-schemas-export"]
description = "Pydantic Job payload から個別 JSON Schema を apps/api/job-schemas/ に書き出し（Job キュー境界 artifact、ADR 0006）"
dir = "apps/api"
run = "uv run python -m scripts.export_job_schemas"

[tasks."api:db-migrate"]
description = "DB マイグレーション適用（alembic upgrade head、ADR 0037）"
dir = "apps/api"
run = "uv run alembic upgrade head"

[tasks."api:db-revision"]
description = "DB マイグレーション生成（alembic revision --autogenerate）"
dir = "apps/api"
run = ["uv run alembic revision --autogenerate -m"]

# ============================================================================
# Frontend tasks（TS / Next.js、ADR 0036）
# ----------------------------------------------------------------------------
# apps/web/ 着手時に有効化。apps/web/package.json に biome / knip / syncpack /
# typescript / @hey-api/openapi-ts / vitest / @testing-library/react / playwright を
# devDep として定義する。
# ============================================================================

[tasks."web:dev"]
description = "Next.js 開発サーバ起動"
dir = "apps/web"
run = "pnpm dev"

[tasks."web:test"]
description = "Frontend テスト（Vitest + RTL、watch なし）"
dir = "apps/web"
# pnpm test:run = vitest run（単発実行）。`mise run web:test` は CI / 静的検査用途なので watch しない。
# 開発中のローカル watch は `cd apps/web && pnpm test` を直接叩く。
run = "pnpm test:run"

[tasks."web:lint"]
description = "TS lint + format + assist 検証（pnpm lint = biome check）"
dir = "apps/web"
# package.json の scripts.lint に委譲。`pnpm lint` と `mise run web:lint` の挙動を一致させ、
# ローカルで `pnpm lint` だけ叩いて緑のつもりが CI で落ちる事故を防ぐ。
run = "pnpm lint"

[tasks."web:format"]
description = "TS lint + format + assist 自動修正（pnpm lint:fix = biome check --write）"
dir = "apps/web"
run = "pnpm lint:fix"

[tasks."web:typecheck"]
description = "TS 型チェック（tsc --noEmit）"
dir = "apps/web"
run = "pnpm exec tsc --noEmit"

[tasks."web:knip"]
description = "未使用 export / file / dep 検出（Knip、apps/web 内）"
dir = "apps/web"
# --no-config-hints: R0 時点で components/ hooks/ lib/ がまだ未作成のため "Refine project pattern
# (no matches)" 系の hints が出るのを抑制（exit code には影響しない、見出しを静かにするだけ）。
run = "pnpm exec knip --no-config-hints"

[tasks."web:knip-fix"]
description = "Knip 自動修正（未使用 export / dep の削除提案を適用、ADR 0021 で参照）"
dir = "apps/web"
run = "pnpm exec knip --fix"

[tasks."web:syncpack"]
description = "package.json 整合性（syncpack lint、3 ルールに縮小、ADR 0024 Note）"
dir = "apps/web"
run = "pnpm exec syncpack lint"

[tasks."web:syncpack-format"]
description = "package.json のキー順整形（syncpack format、ADR 0024 Note / 06-dev-workflow.md で参照）"
dir = "apps/web"
run = "pnpm exec syncpack format"

[tasks."web:types-gen"]
description = "Hey API で OpenAPI から TS / Zod / HTTP クライアント生成（ADR 0006）"
dir = "apps/web"
run = "pnpm exec openapi-ts"

[tasks."web:e2e"]
description = "Playwright E2E"
dir = "apps/web"
run = "pnpm exec playwright test"

# ============================================================================
# Workers tasks（Go、ADR 0016 / 0040）
# ----------------------------------------------------------------------------
# apps/workers/<name>/ 着手時に有効化。各 Worker は独立 Go module。
# ============================================================================

# --- 採点 Worker（apps/workers/grading/、grading + judge LLM） ---

[tasks."worker:grading:dev"]
description = "採点 Worker 起動"
dir = "apps/workers/grading"
run = "go run ./cmd/grading"

[tasks."worker:grading:test"]
description = "採点 Worker テスト（testing + testify）"
dir = "apps/workers/grading"
run = "go test ./..."

[tasks."worker:grading:test:integration"]
description = "採点 Worker 統合テスト（build tag integration、testcontainers-go + 実 LLM API）"
dir = "apps/workers/grading"
# build tag `integration` でデフォルト test から隔離されたファイル群を走らせる。
# 内訳：
#   - internal/db / internal/job / internal/grading: testcontainers-go で
#     postgres:16-alpine を起動して SQL の効果を実 DB で検証（Docker daemon 必須）
#   - internal/llm/google: 実 Gemini API を叩く（GOOGLE_API_KEY 必須、未設定なら t.Skip）
# CI では本タスクを呼ばない（課金 / 鍵管理 / Docker daemon の都合）。ローカル動作確認専用。
run = "go test -tags=integration ./..."

[tasks."worker:grading:lint"]
description = "Go lint（gofmt + golangci-lint、unused linter で未使用検出）"
dir = "apps/workers/grading"
run = "golangci-lint run"

[tasks."worker:grading:deps-check"]
description = "Go 依存整理確認（go mod tidy -diff、Go 1.23+）"
dir = "apps/workers/grading"
# `go mod tidy -diff` は go.mod / go.sum を破壊的に書き換えず、tidy 結果との差分を
# 標準出力に流し exit 1 で返す（Go 1.23+）。git diff 経由（go.sum 未存在時に
# pathspec error が出る）より頑健。
run = "go mod tidy -diff"

[tasks."worker:grading:audit"]
description = "Go 脆弱性スキャン（govulncheck、Worker 着手時に正式採用）"
dir = "apps/workers/grading"
run = "govulncheck ./..."

[tasks."worker:grading:types-gen"]
description = "apps/api/job-schemas/ の各 schema を quicktype で Go struct に展開（Job キュー境界、ADR 0006）"
dir = "apps/api"
# scripts/generate_worker_jobtypes.py が schema ファイル単位で quicktype を呼ぶ。
# quicktype に --src DIR を渡すとスキーマをデータ扱いしてしまうため、positional 引数で
# 1 ファイルずつ渡す必要がある（R0-11 ドキュメント参照）。
# uv run を使う理由：このリポジトリで Python を実行する標準経路（ADR 0035）。
#
# depends で先に schemas-export を走らせる：Worker 系 CI ジョブが本タスク 1 つだけを
# 呼ぶ運用にするため。Pydantic 変更後の schemas/*.schema.json 再生成を取りこぼさない。
depends = ["api:job-schemas-export"]
run = "uv run python -m scripts.generate_worker_jobtypes ../workers/grading"

[tasks."worker:grading:sandbox-build"]
description = "採点サンドボックスイメージをビルド（ai-coding-drill-sandbox:latest、ADR 0009）"
# mise の dir 機能は使わず、build context をパスで直接指定する（docker build は
# Dockerfile を含む dir を引数に取り、cwd を変えると build context だけ変わる）。
run = "docker build -t ai-coding-drill-sandbox:latest apps/workers/grading/sandbox"

# --- 問題生成 Worker（apps/workers/generation/、ADR 0040） ---
#
# R0-8 で grading と同じ品質ゲート（go run / go test / golangci-lint / govulncheck /
# go mod tidy -diff / quicktype types-gen）を揃える。sandbox image は grading 所有のため
# generation 側に sandbox-build タスクは置かない（image を共有起動する、ADR 0009）。

[tasks."worker:generation:dev"]
description = "問題生成 Worker 起動"
dir = "apps/workers/generation"
run = "go run ./cmd/generation"

[tasks."worker:generation:test"]
description = "問題生成 Worker テスト（testing + testify）"
dir = "apps/workers/generation"
run = "go test ./..."

[tasks."worker:generation:lint"]
description = "Go lint（gofmt + golangci-lint、unused linter で未使用検出）"
dir = "apps/workers/generation"
run = "golangci-lint run"

[tasks."worker:generation:deps-check"]
description = "Go 依存整理確認（go mod tidy -diff、Go 1.23+）"
dir = "apps/workers/generation"
# `go mod tidy -diff` は go.mod / go.sum を破壊的に書き換えず、tidy 結果との差分を
# 標準出力に流し exit 1 で返す（Go 1.23+）。grading 側と同じパターン。
run = "go mod tidy -diff"

[tasks."worker:generation:audit"]
description = "Go 脆弱性スキャン（govulncheck）"
dir = "apps/workers/generation"
run = "govulncheck ./..."

[tasks."worker:generation:types-gen"]
description = "apps/api/job-schemas/ の各 schema を quicktype で Go struct に展開（Job キュー境界、ADR 0006）"
dir = "apps/api"
# grading 側と同パターン（scripts/generate_worker_jobtypes.py の引数だけ違う）。
depends = ["api:job-schemas-export"]
run = "uv run python -m scripts.generate_worker_jobtypes ../workers/generation"

# ============================================================================
# 横断タスク — 全言語まとめ実行
# ----------------------------------------------------------------------------
# `depends` で複数タスクを順次実行（mise が依存順序を解決）。
# 単言語のみ実行したい場合は個別の <name>-* タスクを直接呼ぶ。
# ============================================================================

[tasks.lint]
description = "全言語 lint（Backend + Frontend + Workers）"
depends = [
  "api:lint",
  "web:lint",
  "worker:grading:lint",
]

[tasks.test]
description = "全言語 test"
depends = [
  "api:test",
  "web:test",
  "worker:grading:test",
]

[tasks.typecheck]
description = "全言語 typecheck"
depends = [
  "api:typecheck",
  "web:typecheck",
]

[tasks."types-gen"]
description = "Pydantic SSoT → 各言語の型生成パイプライン（HTTP API + Job キュー両境界、CI で drift 検出、ADR 0006）"
depends = [
  "api:openapi-export",
  "api:job-schemas-export",
  "web:types-gen",
  "worker:grading:types-gen",
  "worker:generation:types-gen",
]

# 横断タスクは両 Worker の同名タスクを depends で並べる（R0-8 で両 Worker 実体化済み）。
# worker:dev は系統別の起動コマンドが Worker ごとに異なるため横断タスクを設けず、
# worker:grading:dev / worker:generation:dev を直接呼ぶ運用とする。

# dev:all / dev:restart は web + api をまとめて立ち上げる開発用ショートカット。
#   - depends に並べた長時間タスクは mise が並列で動かし続ける（どちらかが落ちると検知）
#   - dev:restart は :3000（next）と :8000（uvicorn）を listen しているプロセスを落として
#     から起動する。lsof で「TCP LISTEN 状態の PID」だけに絞るため、たまたま同ポートに
#     接続しているクライアント等は誤って kill しない
[tasks."dev:all"]
description = "web (Next.js) + api (FastAPI) + worker (grading) を並行起動"
# worker:grading:dev も含める理由:
#   問題生成 / 採点ジョブは Worker が claim しないと永久に queued のままで、
#   UI 側「生成中…」のまま動かない。Worker 起動忘れによる「動かない」を
#   構造的に防ぐため、dev:all を本当の "全部入り" にする。
# 前提:
#   Docker daemon 稼働 + apps/workers/grading/.env (GOOGLE_API_KEY) +
#   ai-coding-drill-sandbox:latest image。揃っていない時は worker のログに
#   即時 fail-fast の error が出るので原因切り分けは容易。
depends = [
  "api:dev",
  "web:dev",
  "worker:grading:dev",
]

# dev:restart の流儀：
#   1. SIGTERM（kill -15）でまず行儀よく止める。Next.js は子プロセス（esbuild / SWC worker）
#      を spawn しているため、いきなり SIGKILL するとゾンビが残ることがある。
#   2. 1 秒待ってから残ったプロセスに SIGKILL（kill -9）でとどめを刺す。
#   xargs の "-r"（空入力なら起動しない）は GNU 拡張で macOS の BSD xargs にはない。
#   そのため空入力時は引数なしで kill が動いて usage エラーが出るが、`2>/dev/null || true`
#   で握り潰す（実害なし。BSD/GNU 両方で同じ振る舞いになる）。
[tasks."dev:restart"]
description = "web + api を再起動（:3000 / :8000 を listen 中のプロセスを kill してから起動）"
run = """
lsof -ti tcp:3000 -sTCP:LISTEN | xargs kill -15 2>/dev/null || true
lsof -ti tcp:8000 -sTCP:LISTEN | xargs kill -15 2>/dev/null || true
sleep 1
lsof -ti tcp:3000 -sTCP:LISTEN | xargs kill -9 2>/dev/null || true
lsof -ti tcp:8000 -sTCP:LISTEN | xargs kill -9 2>/dev/null || true
mise run dev:all
"""

[tasks."worker:test"]
description = "全 Worker の go test（両 Worker 並列）"
depends = [
  "worker:grading:test",
  "worker:generation:test",
]

[tasks."worker:lint"]
description = "全 Worker の golangci-lint（両 Worker 並列）"
depends = [
  "worker:grading:lint",
  "worker:generation:lint",
]

[tasks."worker:types-gen"]
description = "全 Worker の Go struct 生成（quicktype、両 Worker 対称適用、ADR 0006）"
depends = [
  "api:job-schemas-export",
  "worker:grading:types-gen",
  "worker:generation:types-gen",
]

# ============================================================================
# root レベルタスク（言語横断、orchestration 専用層）
# ============================================================================

[tasks.commitlint]
description = "コミットメッセージ規約検証（mise 経由 commitlint、commit-msg フックから起動）"
run = "commitlint --edit"

[tasks."git:clean"]
description = "マージ済みでリモートが消えたローカルブランチを掃除"
run = "bash scripts/cleanup-merged-branches.sh"

# ============================================================================
# bootstrap — 新規参画者向け一発セットアップ
# ============================================================================
# 各ステップの意図:
#   1. mise install
#      mise.toml で固定された全 tool を一括取得（Python / Node / Go / uv / pnpm /
#      lefthook v2 / commitlint 等）。
#   2. git config --unset --local core.hooksPath
#      lefthook v2 は core.hooksPath が明示設定されていると hook 自動同期を skip する。
#      過去に lefthook v1 で install されたクローンや、何かのきっかけで .git/hooks/
#      が明示指定された状態を冪等にクリーンアップする（未設定なら no-op）。
#   3. lefthook install
#      lefthook.yml に基づいて .git/hooks/ にフックスクリプトを配置する。
[tasks.bootstrap]
description = "新規参画者向けセットアップ：tool 一括インストール + Git フック登録"
run = [
  "mise install",
  "git config --unset --local core.hooksPath 2>/dev/null || true",
  "lefthook install",
]
