# lefthook 設定ファイル
# Git フックを管理し、commit / push 時に自動チェックを実行する。
# 公式: https://lefthook.dev/configuration/
#
pre-commit:
  parallel: true
  commands:
    biome:
      # ステージ済みの TS/JS/JSON 系ファイルに対し Biome の lint + format を実行。
      # --write でフォーマット差分は自動修正、--no-errors-on-unmatched で対象ゼロ時もエラーにしない。
      # stage_fixed: true で Biome が書き換えたファイルを自動再ステージし、
      # フォーマット差分のためにコミットがブロックされ続ける現象を防ぐ。
      glob: "*.{ts,tsx,js,jsx,mjs,cjs,json,jsonc}"
      run: pnpm exec biome check --write --no-errors-on-unmatched --files-ignore-unknown=true {staged_files}
      stage_fixed: true

    typecheck:
      # ルート直下の TS 設定ファイル（commitlint.config.ts、将来の .syncpackrc.ts 等）の型チェック。
      # `tsc` はプロジェクト単位で動作するため、ファイル単位の起動はできない。
      # `.ts` ファイルが 1 つでも staged にあれば tsconfig.json 全体を検証する。
      # 根拠：ADR 0028（設定ファイルは TS 化により型安全を機械保証する方針）。
      # 注：workspace 配下の TS 型チェックは Turborepo 経由で別途実行される（pnpm typecheck）。
      #
      # glob パターン：
      #   "*.ts"  ─ 通常 TS ファイル（commitlint.config.ts 等）
      #   ".*.ts" ─ dotfile TS ファイル（.syncpackrc.ts 等。`*` は dotfile を拾わないため別パターン）
      #   tsconfig.json の include と対称（同じ範囲をトリガする）。
      glob: "{*.ts,.*.ts}"
      run: pnpm exec tsc --noEmit -p tsconfig.json

commit-msg:
  commands:
    commitlint:
      # commit-msg フックで commitlint を実行し、コミットメッセージが
      # Conventional Commits 規約（commitlint.config.ts）に従っているかを検証する。
      #
      # コマンド分解:
      #   pnpm exec   ─ プロジェクトの node_modules/.bin から実行可能ファイルを起動
      #                  （グローバルインストール不要、devDependencies の commitlint を使う）
      #   commitlint  ─ @commitlint/cli の本体
      #   --edit      ─ 「ファイルパスを引数に取り、その中身をコミットメッセージとして検証する」モード
      #                  （--edit が無いと stdin やオプションでメッセージを渡す必要がある）
      #   {1}         ─ lefthook が commit-msg フックの第 1 引数を埋め込むプレースホルダ
      #                  Git が commit-msg フックに渡す引数 = .git/COMMIT_EDITMSG（編集中のメッセージファイル）
      #
      # 結果として: pnpm exec commitlint --edit .git/COMMIT_EDITMSG が実行され、
      # 検証失敗時は exit 1 を返してコミットがブロックされる。
      run: pnpm exec commitlint --edit {1}
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  コミットメッセージが規約に違反しています
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        【正しいコミットメッセージ例】
          feat(api): 問題生成エンドポイントを追加

        【形式】
          <type>(<scope>): <subject>
          └─┬──┘ └──┬──┘   └───┬───┘
            │       │          └ subject : 変更内容を簡潔に（日本語可、ヘッダー全体 100 文字以内）
            │       └──────────- scope   : web / api / worker / shared / config / infra / docs / db / deps （省略可、複数はカンマ区切り）
            └──────────────────- type    : feat / fix / docs / refactor / test / chore / ci / build / perf / style / revert （必須）

        詳細は以下を参照:
          - .claude/CLAUDE.md「コミットメッセージ」セクション
          - commitlint.config.ts（許可リストの SSoT）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
