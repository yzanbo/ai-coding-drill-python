# lefthook 設定ファイル
# Git フックを管理し、commit / push 時に自動チェックを実行する。
# 公式: https://lefthook.dev/configuration/
#
# 設計方針（ADR 0036 拡張版）：
#   root では言語横断のチェック（commitlint）のみを扱う。
#   各言語（TS / Python / Go）固有の lint / format / typecheck は、
#   各 app 着手時に `mise run <task>` 経由で本ファイルに pre-commit フックとして追加する：
#     - apps/web 着手時：biome / typecheck / knip フックを `mise run web:*` で接続
#     - apps/api 着手時：ruff / pyright / pip-audit / deptry フックを `mise run api:*` で接続
#     - apps/workers/<name>/ 着手時：golangci-lint / go-mod-tidy フックを `mise run worker:<name>:*` で接続（ADR 0040）
#   これにより各言語ツールの実行経路は ADR 0039（mise）に統一される。

pre-commit:
  parallel: true
  commands:
    # ─────────────────────────────────────────────────────────────────
    # Python (apps/api/) — ruff check --fix + pyright
    # ─────────────────────────────────────────────────────────────────
    # `mise exec --` 経由で起動する理由は本ファイル下段の commit-msg と同じ
    # （Git フックは非対話シェルで PATH に shims が無く、直接 ruff / pyright を呼べないため）。
    # ruff は --fix 結果を stage_fixed: true で自動再ステージし、ローカル PR の
    # 「format / import 順違反だけのコミット」を発生させない。

    # lint + format（ruff）
    api-ruff:
      glob: "apps/api/**/*.py"
      root: apps/api
      run: mise exec -- uv run ruff check --fix {staged_files}
      stage_fixed: true

    # 型チェック（pyright）
    api-pyright:
      glob: "apps/api/**/*.py"
      root: apps/api
      # pyright は対象ファイル単位の起動より apps/api 全体を見る方が正確
      # （import 解析が他ファイルに依存するため）。stale な誤検知を避ける目的。
      run: mise exec -- uv run pyright

    # ─────────────────────────────────────────────────────────────────
    # Frontend (apps/web/) — Biome check --write + tsc + Knip
    # ─────────────────────────────────────────────────────────────────
    # 起動経路は mise exec -- 経由（Git フックの非対話シェルに shims を解決させるため、
    # commit-msg / api-* と同じ理由）。Biome は --write の自動修正結果を stage_fixed: true で
    # 自動再ステージし、ローカル PR の「format 違反だけのコミット」を発生させない。

    # lint + format（Biome）— ステージ済の .ts/.tsx/.js/.jsx/.json/.jsonc/.css に適用
    web-biome:
      glob: "apps/web/**/*.{ts,tsx,js,jsx,json,jsonc,css}"
      root: apps/web
      run: mise exec -- pnpm exec biome check --write --no-errors-on-unmatched {staged_files}
      stage_fixed: true

    # 型チェック（tsc --noEmit）— 対象ファイル単位ではなく apps/web 全体を見る
    # （TS の import 解析は他ファイルに依存するため、pyright と同じ理由で stale 誤検知を避ける）
    web-typecheck:
      glob: "apps/web/**/*.{ts,tsx}"
      root: apps/web
      run: mise exec -- pnpm exec tsc --noEmit

    # 未使用 export / file / dependency 検出（Knip）
    # 重い場合は CI 専用に切り替える運用余地を残す（現状は pre-commit でも秒オーダーで完了）
    web-knip:
      glob: "apps/web/**/*.{ts,tsx,json,jsonc}"
      root: apps/web
      run: mise exec -- pnpm exec knip --no-progress

    # ─────────────────────────────────────────────────────────────────
    # Worker (apps/workers/**) — gofmt + golangci-lint（差分行のみ）
    # ─────────────────────────────────────────────────────────────────
    # ADR 0019 の Go 品質ツール（gofmt + golangci-lint）を pre-commit で発火。
    # 起動経路は `mise exec --` 経由（他フックと同じく、Git フックの非対話シェルに
    # PATH / shims を解決させるため）。

    # gofmt: ステージ済 *.go を破壊的に整形して再ステージ。format 違反だけのコミットを発生させない。
    worker-gofmt:
      glob: "apps/workers/**/*.go"
      run: mise exec -- gofmt -w {staged_files}
      stage_fixed: true

    # golangci-lint: 全体走査ではなく `--new-from-rev=HEAD` で「未コミットの差分行のみ」を検査して高速化。
    # 全体走査は pre-push の go test 経由 + CI の worker-<worker>-lint ジョブで担保する。
    # 独立 Go module（ADR 0040）のため Worker ごとに hook を分ける（module 跨ぎで lint 不可）。
    worker-grading-golangci-lint:
      glob: "apps/workers/grading/**/*.go"
      root: apps/workers/grading
      run: mise exec -- golangci-lint run --new-from-rev=HEAD ./...

    worker-generation-golangci-lint:
      glob: "apps/workers/generation/**/*.go"
      root: apps/workers/generation
      run: mise exec -- golangci-lint run --new-from-rev=HEAD ./...

    # ─────────────────────────────────────────────────────────────────
    # Pydantic SSoT → artifact 同期検証（ADR 0006、型同期パイプライン）
    # ─────────────────────────────────────────────────────────────────
    # apps/api/app/schemas/ 配下が変更された commit でのみ起動する。3 artifact
    # （apps/api/openapi.json / apps/api/job-schemas/ / apps/web/src/__generated__/api/）
    # を再生成し、git diff が出たら abort して開発者に再生成 + 再 add を促す。
    # ローカルの早期 feedback 用。hook を --no-verify でバイパスされた場合は
    # CI の types-gen-drift ジョブ（後続ステップ）が最終ゲートとして守る。
    schemas-drift:
      # trigger 対象は「OpenAPI / Job スキーマ artifact に影響する Backend コード」：
      #   - apps/api/app/schemas/**  : Pydantic モデル（直接 OpenAPI / job-schemas を構成）
      #   - apps/api/app/routers/**  : path / method / docstring / response_model
      #                                （docstring は OpenAPI description に出る、
      #                                 response_model の付け外しは schema 構造に影響）
      # routers/ を追加した経緯：routers/auth.py の docstring 変更で artifact が
      # drift したが schemas/ のみ trigger だったため pre-commit がスキップされ、
      # CI の git diff --exit-code で初めて検知された事故（commit c5c599f → 0caf558）。
      # main.py の include_router 変更は対象外（新規 router ファイル追加時は
      # routers/** 側で trigger される、reorder / 削除は稀なため YAGNI）。
      glob: "apps/api/app/{schemas,routers}/**"
      run: |
        set -e
        mise exec -- mise run api:openapi-export
        mise exec -- mise run api:job-schemas-export
        mise exec -- mise run web:types-gen
        git diff --exit-code apps/api/openapi.json apps/api/job-schemas/ apps/web/src/__generated__/api/
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  Pydantic 変更後の artifact 再生成が漏れています（commit をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        下記を実行してから再 commit してください:
          mise run api:openapi-export
          mise run api:job-schemas-export
          mise run web:types-gen
          git add apps/api/openapi.json apps/api/job-schemas/ apps/web/src/__generated__/api/

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

pre-push:
  commands:
    # テスト実行（pytest）
    # push 前の動的検証ゲート：pre-commit の静的検査と CI の間にあるギャップを埋める。
    # API コード変更時（glob: apps/api/**/*.py）にのみ発火。integration テストは Postgres
    # 必須なので、DB 未起動なら fail させて push をブロックする（graceful skip は採用しない、
    # "ローカル緑 = 全テスト通過" の保証を強くするため）。fail 時は fail_text に従い
    # mise run test:up してから再 push すればよい。
    #
    # `mise run api:test` を経由する理由（issue #86 の延長 / dev DB 保護）：
    #   pytest の integration テストは reset_* fixture で実テーブルを DELETE するため、
    #   必ず テスト用 DB (:5433/ai_coding_drill_test) に向ける必要がある。api:test タスクは
    #   depends で test:up を呼び、env で DATABASE_URL / REDIS_URL を強制上書きする。
    #   直接 `uv run pytest` を呼ぶと .env の dev DSN がそのまま使われて作業データが消える
    #   事故が起きるため、必ずタスク経由で起動する。
    api-pytest:
      glob: "apps/api/**/*.py"
      # skip: push 対象のコミット差分に .py 変更が一切無ければスキップする。
      #   lefthook 1.7 系の pre-push は `glob:` 単体だと filter として効かず、
      #   .py 差分ゼロの push でも api-pytest が発火して並行 worktree との Docker
      #   コンテナ衝突で誤失敗するケースがある。push 範囲（@{upstream}..HEAD）の
      #   diff を自前で grep し、空なら早期 skip して構造的に回避する。
      #   - `@{upstream}` が無い（新規ブランチ初回 push 等）場合は `origin/main` に
      #     フォールバック。それでも無い場合は skip しない（保守的）。
      #   - `! ... | grep -q` の終了コード 0 で lefthook が hook を skip する。
      skip:
        - run: |
            base="$(git rev-parse --symbolic-full-name '@{upstream}' 2>/dev/null || echo refs/remotes/origin/main)"
            git rev-parse --verify "$base" >/dev/null 2>&1 || exit 1
            ! git diff --name-only "$base..HEAD" | grep -qE '^apps/api/.*\.py$'
      # `mise exec --` で囲む理由：他フック（api-ruff / api-pyright / web-biome 等）と
      # 一貫性を取るため。Git フックは非対話シェルで起動され ~/.zshrc 等の mise activate を
      # 読まないため、mise 自体が PATH にあっても shims（uv / pnpm 等）が解決できない環境がある。
      # `mise exec --` で明示的に mise の shim 解決パスを通してから `mise run` を呼ぶ。
      run: mise exec -- mise run api:test
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  pytest が失敗しました（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        失敗の詳細は上の pytest ログを確認してください。

        【よくある原因】
          ・テストの修正漏れ / 実装変更の取り込み忘れ
              → 上のエラーに従ってテスト or 実装を修正
          ・テスト用 Postgres / Redis 未起動（asyncpg ConnectionRefusedError 等）
              → mise run test:up してから再 push（api:test は depends で自動起動するが
                 Docker 本体が落ちている時はここで失敗する）
          ・"テスト用 DB (DB 名末尾 '_test') に対してのみ実行できます" が出た
              → PYTEST_DATABASE_URL で dev DSN を指していないか確認

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # 脆弱性スキャン（pip-audit）
    # 依存パッケージの既知 CVE を PyPI Advisory DB / OSV と突き合わせて検出する。
    # pre-commit ではなく pre-push に置く理由：pip-audit はネットワーク I/O を伴い
    # （DB 取得）pre-commit ではコスト過大、かつ脆弱性検知は commit 単位より push 単位で
    # 確認すれば CI 失敗を十分先回りできるため。
    # glob を uv.lock / pyproject.toml に限定する理由：脆弱性は「コード変更」ではなく
    # 「依存バージョン」で決まるため、.py を 1 行直しただけの push で audit を走らせるのは
    # 無駄。依存追加・更新時のみ発火させ、開発者の手を止めるタイミングを最小化する。
    # 新規 CVE 発見の自動追従は Dependabot（GitHub） + 週次 CI で別途担保する。
    api-audit:
      glob: "apps/api/{uv.lock,pyproject.toml}"
      root: apps/api
      run: mise exec -- uv run pip-audit
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  pip-audit が依存パッケージの脆弱性を検出しました（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        上の pip-audit ログから Name / ID / Fix Versions を確認し、以下で bump:
          cd apps/api
          uv lock --upgrade-package <package-name>
          git add uv.lock
          git commit -m "chore(deps): <package> を <old> から <new> へ bump (<CVE>)"

        【ネットワーク疎通エラーの場合】
          OSV / PyPI Advisory DB への接続に失敗している可能性。プロキシ環境では
          オフライン bump 後に CI でゲートする運用に切り替える。

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # 依存衛生（deptry）
    # pyproject.toml の dependencies と実コードの import を突き合わせ、
    # 「宣言したのに未使用」「import してるのに未宣言」「transitive 依存への参照」を検出する。
    # pre-commit ではなく pre-push に置く理由：repo 全体スキャンで pre-commit ではやや重く、
    # かつ依存変更は commit 単位より push 単位で確認すれば CI 失敗を十分先回りできるため。
    # pyproject.toml も trigger 対象に含める（依存追加・例外追加時に発火させるため）。
    # glob: lefthook (v1.7) の `**` は **1 階層以上のディレクトリ**を要求する仕様で、
    # 直下ファイル（`apps/api/pyproject.toml` 等）は `apps/api/**/*.toml` にマッチせず
    # silent skip される（PR #120 で実際に踏んだ）。直下と任意階層を OR で並べて両方を
    # 拾うため、外側ブレース `{...,...}` で 2 パターンを列挙する。同型の罠は他フックの
    # `apps/X/**/...` glob にも残っている可能性が高いが、副作用を避けて本 PR では
    # api-deptry のみ修正、横断 sweep は別 PR とする。
    api-deptry:
      glob: "{apps/api/*.{py,toml},apps/api/**/*.{py,toml}}"
      root: apps/api
      run: mise exec -- uv run deptry .
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  deptry が依存の不整合を検出しました（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        上の deptry ログのルール ID で対処方針が分かれます：
          ・DEP001（未宣言の import）       → pyproject.toml に依存を追加
          ・DEP002（宣言したのに未使用）    → 不要なら削除、import せず実行に必須なら
                                              pyproject.toml の [tool.deptry.per_rule_ignores]
                                              の DEP002 リストに理由コメント付きで追加
          ・DEP003（transitive 依存に依存） → 直接依存として pyproject.toml に追加
          ・DEP004（dev のみ依存を本体で使用）→ dev → 本体に昇格

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # ─────────────────────────────────────────────────────────────────
    # Frontend (apps/web/) — Vitest run + next build
    # ─────────────────────────────────────────────────────────────────
    # push 前の動的検証ゲート：pre-commit の静的検査と CI の間のギャップを埋める。
    # `tsc --noEmit` だけでは見えない RSC / SSG / image 最適化など next build 段階固有の
    # エラーを先回り検出する。glob で apps/web 変更時のみ発火し、Backend / docs のみの push では
    # 起動しない。`mise exec --` 経由は他フックと同じ理由（shims 解決）。
    web-vitest:
      glob: "apps/web/**/*.{ts,tsx}"
      root: apps/web
      run: mise exec -- pnpm exec vitest run

    # Playwright E2E（実 Postgres + Redis + mock-github + Next.js + FastAPI を立てて
    # ブラウザで叩く）。webServer は playwright.config.ts が自動で起動する。
    # `mise exec -- mise run web:e2e` 経由で起動する理由：web:e2e タスクが depends で
    # test:up を呼ぶため、テスト用 Postgres / Redis が未起動でも自動で立てる。
    # CI 側の web-e2e ジョブとほぼ同じ経路をローカルでも踏ませて、push 前に dead 行きの
    # grading ジョブ等を観測できるようにする（issue #82 で test_cases seed shape を
    # Worker 契約に揃えた regression が pre-push でも自動で守られる）。
    # glob: apps/web 変更 + e2e ヘルパ（apps/web/e2e/**）変更 + API 側 schemas 変更で発火。
    # apps/api 側の変更でも発火する理由：OpenAPI 経由で web の生成型に伝播するため、
    # API の breaking change を push する時に E2E を一緒に回したい。
    # glob: lefthook の glob は単一 glob 文字列で、ブレース展開 `{a,b,c}` のみ複数候補に
    # 展開される。**トップレベルのカンマ区切りはサポートされず**、リテラル `,` として扱われて
    # 何にもマッチしない silent skip になる（過去に他フックでこのバグを踏んだ）。
    # 複数パターンを OR したい時は外側のブレースで包んで `{p1,p2,p3}` の形にする。
    web-e2e:
      glob: "{apps/web/**/*.ts,apps/web/**/*.tsx,apps/web/**/*.css,apps/web/**/*.json,apps/web/e2e/**/*,apps/api/app/**/*.py}"
      run: mise exec -- mise run web:e2e
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  Playwright E2E が失敗しました（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        失敗の詳細は上の playwright ログを確認してください。

        【よくある原因】
          ・テスト用 Postgres / Redis 未起動（webServer が DB 接続できない）
              → mise run test:up してから再 push（web:e2e は depends で自動起動するが
                 Docker 本体が落ちている時はここで失敗する）
          ・ブラウザ未インストール（"Executable doesn't exist"）
              → cd apps/web && pnpm exec playwright install --with-deps chromium
          ・port 競合（dev サーバが 3000 / 8000 を握ったまま）
              → mise run dev:restart で kill してから再 push

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    web-next-build:
      glob: "apps/web/**/*.{ts,tsx,css,json}"
      root: apps/web
      run: mise exec -- pnpm exec next build
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  next build が失敗しました（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        失敗の詳細は上の next build ログを確認してください。
        RSC（Server Component）で window / document を参照していないか、
        Image 最適化のパス（sharp）が拾えているか、などをまず疑う。

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # ─────────────────────────────────────────────────────────────────
    # Worker (apps/workers/grading/) — types-gen + go test ./...
    # ─────────────────────────────────────────────────────────────────
    # push 前の動的検証ゲート（pre-commit の静的検査と CI の間のギャップを埋める）。
    # Go の test は通常高速（数秒）なので全体走査でよい。pytest と違い DB 依存テストは
    # testcontainers-go で test ごとに spin up する Go 慣習のため、graceful skip 不要。
    # govulncheck はここでは走らせない（脆弱性スキャンは週次で十分なため CI 専用）。
    #
    # types-gen を先に走らせる理由（R0-11）：jobtypes/*.go は gitignored のため、
    # ローカル workspace の types.go が Pydantic 更新後も古いままで go test が
    # silently に古い型で通ってしまうリスクを潰す。Pydantic（apps/api/app/schemas/jobs/）
    # 変更も trigger 対象に含めて、Worker .go を一切触らない変更でも検証を回す。
    worker-grading-go-test:
      # glob: トップレベルのカンマ区切りは未サポートのため、外側のブレースで包んで OR を表現する
      # （web-e2e の glob コメント参照）。
      glob: "{apps/workers/grading/**/*.go,apps/api/app/schemas/jobs/**/*}"
      run: |
        set -e
        mise exec -- mise run worker:grading:types-gen
        cd apps/workers/grading
        mise exec -- go test ./...
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  grading の types-gen / go test が失敗しました（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        失敗の詳細は上のログを確認してください。
        ・types-gen が落ちた場合: apps/api/app/schemas/jobs/ の Pydantic を見直す
        ・go test が落ちた場合 : DB 依存テストなら testcontainers が docker daemon に
                                  接続できているか、Docker Desktop / OrbStack が
                                  起動しているかをまず疑う

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    worker-generation-go-test:
      # glob: web-e2e の glob コメント参照（top-level カンマ未サポートのため外側ブレースで OR）。
      glob: "{apps/workers/generation/**/*.go,apps/api/app/schemas/jobs/**/*}"
      run: |
        set -e
        mise exec -- mise run worker:generation:types-gen
        cd apps/workers/generation
        mise exec -- go test ./...
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  generation の types-gen / go test が失敗しました（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        失敗の詳細は上のログを確認してください。
        ・types-gen が落ちた場合: apps/api/app/schemas/jobs/ の Pydantic を見直す
        ・go test が落ちた場合 : DB 依存テストなら testcontainers が docker daemon に
                                  接続できているか、Docker Desktop / OrbStack が
                                  起動しているかをまず疑う

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # Worker (Go) 脆弱性スキャン（govulncheck）
    # api-audit (pip-audit) と同じ位置づけ：依存ファイル変更時のみ発火する pre-push。
    # govulncheck はシンボル単位の到達可能性解析を行うため、コードから実際に呼ばれる
    # 脆弱な API があるパスだけ exit 1 で push をブロックする。transitive 依存に
    # 脆弱性があってもコードが触れていない場合は exit 0 で通る (誤検知抑制)。
    # glob を go.mod / go.sum に限定: 脆弱性は「コード変更」ではなく「依存バージョン」で
    # 決まるため、.go を 1 行直しただけの push で audit を走らせるのは無駄。
    # 新規 CVE 発見の自動追従は Dependabot + 週次 CI で別途担保する。
    # 独立 Go module (ADR 0040) のため Worker ごとに hook を分ける。
    worker-grading-audit:
      glob: "apps/workers/grading/{go.mod,go.sum}"
      root: apps/workers/grading
      run: mise exec -- govulncheck ./...
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  govulncheck が grading worker の依存に到達可能な脆弱性を検出（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        上の govulncheck ログから Module / Fixed in を確認し、以下で bump:
          cd apps/workers/grading
          go get <module>@<fixed-version>
          go mod tidy
          git add go.mod go.sum
          git commit -m "chore(deps): <module> を <old> から <new> へ bump (<CVE>)"

        【脆弱性が transitive 依存の場合】
          直接 require 行を追加せず、go.mod の require ブロックに version 指定だけ
          書く方法もある (Go の MVS で最小選択が上書きされる)。

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    worker-generation-audit:
      glob: "apps/workers/generation/{go.mod,go.sum}"
      root: apps/workers/generation
      run: mise exec -- govulncheck ./...
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  govulncheck が generation worker の依存に到達可能な脆弱性を検出（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        上の govulncheck ログから Module / Fixed in を確認し、以下で bump:
          cd apps/workers/generation
          go get <module>@<fixed-version>
          go mod tidy
          git add go.mod go.sum
          git commit -m "chore(deps): <module> を <old> から <new> へ bump (<CVE>)"

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    # Worker (Go) 依存衛生（go mod tidy -diff）
    # api-deptry と同じ位置づけ：依存ファイル / Pydantic スキーマ変更時のみ発火する pre-push。
    # `go mod tidy -diff` で go.mod / go.sum と実 import の整合性を検証し、
    # 「require 行が古い」「未使用 require が残っている」push を CI 前に弾く。
    #
    # trigger を go.mod / go.sum + apps/api/app/schemas/jobs/** に限定する理由：
    #   - .go 1 行直しただけの push で audit を走らせるのは無駄（go.mod が動かないため）
    #   - Pydantic ジョブスキーマ変更は内部生成型 (jobtypes) を経由して import 構造に
    #     影響しうるので念のため検証対象に含める
    #
    # types-gen を前段に挟む理由（CI と同じ）：
    #   jobtypes/*.go は gitignored のため、`go mod tidy` が `internal/jobtypes` の
    #   import 解決のために生成済 types.go を必要とする。これが無いと「外部 module を
    #   fetch しに行く → 失敗」で偽陽性 fail になる。
    #
    # 独立 Go module (ADR 0040) のため Worker ごとに hook を分ける。
    worker-grading-deps-check:
      # glob: web-e2e の glob コメント参照（top-level カンマ未サポートのため外側ブレースで OR）。
      # 元の `apps/workers/grading/{go.mod,go.sum}` を平坦化して `go.mod / go.sum` を別パターンに展開。
      glob: "{apps/workers/grading/go.mod,apps/workers/grading/go.sum,apps/api/app/schemas/jobs/**/*}"
      run: |
        set -e
        mise exec -- mise run worker:grading:types-gen
        mise exec -- mise run worker:grading:deps-check
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  grading の go.mod / go.sum が実コードと不整合（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        上の `go mod tidy -diff` の出力に従って tidy を実行し、再 commit してください:
          cd apps/workers/grading
          go mod tidy
          git add go.mod go.sum
          git commit -m "chore(deps): grading worker の go.mod / go.sum を tidy"

        【types-gen が落ちた場合】
          apps/api/app/schemas/jobs/ の Pydantic を見直す or Python 側依存を更新する。

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

    worker-generation-deps-check:
      # glob: web-e2e の glob コメント参照（top-level カンマ未サポートのため外側ブレースで OR）。
      glob: "{apps/workers/generation/go.mod,apps/workers/generation/go.sum,apps/api/app/schemas/jobs/**/*}"
      run: |
        set -e
        mise exec -- mise run worker:generation:types-gen
        mise exec -- mise run worker:generation:deps-check
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  generation の go.mod / go.sum が実コードと不整合（push をブロック）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        上の `go mod tidy -diff` の出力に従って tidy を実行し、再 commit してください:
          cd apps/workers/generation
          go mod tidy
          git add go.mod go.sum
          git commit -m "chore(deps): generation worker の go.mod / go.sum を tidy"

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

commit-msg:
  commands:
    # コミットメッセージ規約検証（commitlint）
    commitlint:
      # commit-msg フックで commitlint を実行し、コミットメッセージが
      # Conventional Commits 規約（commitlint.config.mjs）に従っているかを検証する。
      #
      # 実行経路は環境に応じて自動切替（環境差異耐性）:
      #   1. mise が PATH にある場合（このプロジェクトの標準、ADR 0039）
      #      → `mise exec --` 経由で mise.toml の `npm:@commitlint/cli` を解決
      #      Git フックは非対話シェルで起動され `~/.zshrc` 等の mise activate を読まないため、
      #      明示的に `mise exec` で囲まないと PATH に shims が無く command not found になる
      #   2. mise が無く commitlint だけ globally インストールされている場合
      #      → 直接 `commitlint` を呼ぶ（mise を採用していない開発者のフォールバック）
      #   3. どちらも無い場合
      #      → command not found で落ちる（CONTRIBUTING.md の「mise install」案内に従う）
      #
      # 引数:
      #   --edit  : ファイルパスを引数に取り、その中身をコミットメッセージとして検証
      #   {1}     : lefthook が commit-msg フックの第 1 引数（=.git/COMMIT_EDITMSG）を埋め込む
      run: |
        if command -v mise >/dev/null 2>&1; then
          mise exec -- commitlint --edit {1}
        else
          commitlint --edit {1}
        fi
      fail_text: |

        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
        ⚠️  コミットメッセージが規約に違反しています
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

        【正しいコミットメッセージ例】
          feat(api): 問題生成エンドポイントを追加

        【形式】
          <type>(<scope>): <subject>
          └─┬──┘ └──┬──┘   └───┬───┘
            │       │          └ subject : 変更内容を簡潔に（日本語可、ヘッダー全体 100 文字以内）
            │       └──────────- scope   : web / api / worker / shared / config / infra / docs / db / deps / deps-dev （省略可、複数はカンマ区切り）
            └──────────────────- type    : feat / fix / docs / refactor / test / chore / ci / build / perf / style / revert （必須）

        詳細は以下を参照:
          - .claude/CLAUDE.md「コミットメッセージ」セクション
          - commitlint.config.mjs（許可リストの SSoT）
        ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
