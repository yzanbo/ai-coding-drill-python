# テスト用ミドルウェア（Postgres + Redis、dev から完全分離）
#
# 役割：
#   - issue #86 の長期 fix。dev DB（docker-compose.yml）と物理的に分離した
#     Postgres / Redis を立てて、E2E の /_test/reset が dev データを巻き添えで
#     消す事故を構造的に防ぐ。
#   - ホスト側のポートを dev (5432 / 6379) と被らない 5433 / 6380 にして
#     dev:all と E2E を並行起動できるようにする。
#   - tmpfs で /var/lib/postgresql/data / /data をメモリ上に展開して
#     E2E run を高速化する（永続化不要のため）。
#
# 起動：
#   docker compose -f docker-compose.test.yml up -d --wait   # ヘルスチェック通過まで待つ
#   docker compose -f docker-compose.test.yml down -v        # コンテナ + tmpfs を破棄
#
# mise から：
#   mise run test:up      # 起動 + Alembic 適用
#   mise run test:down    # 停止 + ボリューム破棄

services:
  postgres-test:
    image: postgres:18.3-alpine
    container_name: ai-coding-drill-postgres-test
    environment:
      POSTGRES_DB: ai_coding_drill_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # PGDATA を tmpfs 内の **サブディレクトリ** に明示。
      #   Postgres 18+ の Docker イメージは /var/lib/postgresql/data を直接 PGDATA にすると
      #   「mount された空ディレクトリ＝中身のないボリュームだ」と判断して
      #   initdb せずに起動エラーで落ちる仕様になった
      #   （major version 別サブディレクトリ運用が推奨されたため）。
      #   PGDATA をサブディレクトリに固定することで、Postgres が空のサブディレクトリに
      #   initdb していい状態と認識し、tmpfs でも問題なく初期化が走るようになる
      #   （公式 image の README 推奨パターン）。
      PGDATA: /var/lib/postgresql/data/pgdata
    ports:
      # ホスト側 5433 → コンテナ 5432。dev の 5432 と並行起動可能。
      - "5433:5432"
    tmpfs:
      # E2E は揮発でよい。tmpfs にすることで I/O が速くなる + 後始末不要。
      # tmpfs の根 (/var/lib/postgresql/data) は空のまま、その下の pgdata/ サブディレクトリに
      # initdb される（PGDATA env で指定）。
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ai_coding_drill_test"]
      interval: 2s
      timeout: 5s
      retries: 30

  redis-test:
    image: redis:8.6-alpine
    container_name: ai-coding-drill-redis-test
    ports:
      - "6380:6379"
    tmpfs:
      - /data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30
