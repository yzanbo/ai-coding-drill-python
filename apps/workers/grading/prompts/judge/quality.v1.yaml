# LLM-as-a-Judge プロンプト（問題品質評価、v1）
# 生成された問題を別モデル（生成と異なるベンダー・モデル）で評価する
# バージョン管理：評価軸の追加・削除時は v2 を新規作成

version: v1
model_role: judge

# ─────────────────────────────────────────────
# システムプロンプト（評価者の役割定義）
# ─────────────────────────────────────────────
system_prompt: |
  あなたは TypeScript 学習サイトの問題品質を評価する評価者です。
  与えられた問題を 5 つの軸で 1〜5 点で評価してください：

  1. 問題文の明確さ（曖昧さがないか、何を実装すべきかが明確か）
  2. テストケースの網羅性（境界値・エッジケース・典型ケースをカバーしているか）
  3. 難易度の妥当性（指定された難易度と実装の難しさが一致しているか）
  4. 教育的価値（学習者が解くことで何かを学べるか）
  5. 既視感・独自性（よくある退屈な問題か、工夫があるか）

  各軸の評価基準：
  - 1: 致命的な問題あり、不採用相当
  - 2: 大きな改善の余地
  - 3: 平均的、使えるが特に良くもない
  - 4: 良い問題
  - 5: 非常に良い問題

  出力は JSON 形式で、各軸のスコアと簡潔な理由を含めること。

# ─────────────────────────────────────────────
# ユーザープロンプトテンプレート
# ─────────────────────────────────────────────
user_template: |
  以下の問題を評価してください。

  ===== 問題 =====
  {{problem_json}}

  ===== 出力形式 =====
  {
    "clarity": { "score": 1-5, "reason": "..." },
    "test_coverage": { "score": 1-5, "reason": "..." },
    "difficulty_match": { "score": 1-5, "reason": "..." },
    "educational_value": { "score": 1-5, "reason": "..." },
    "originality": { "score": 1-5, "reason": "..." },
    "total": 5-25
  }

# ─────────────────────────────────────────────
# 出力スキーマへの参照
# ─────────────────────────────────────────────
output_schema_ref: ../../shared-types/schemas/judge-result.schema.json

# ─────────────────────────────────────────────
# 評価運用
# ─────────────────────────────────────────────
evaluation:
  # 同じ問題を複数回評価して平均を取る（LLM のブレを抑える）
  num_runs: 3
  # 合計スコア閾値、これを下回ったら再生成
  threshold: 20  # out of 25
  # 生成と Judge は別ベンダー・別モデル（自己評価バイアス回避）
  # モデル指定は LlmProvider 設定（YAML）側で行う

# ─────────────────────────────────────────────
# パラメータ
# ─────────────────────────────────────────────
parameters:
  temperature: 0.3  # 評価は安定性重視で低め
  max_tokens: 2048

# ─────────────────────────────────────────────
# メタ情報
# ─────────────────────────────────────────────
metadata:
  created_at: "2026-04-25"
  notes: |
    初版骨組み。実装着手時に以下を実施：
    - 人間評価サンプルを少数取り、Judge スコアとの相関を確認（キャリブレーション）
    - 相関が低い軸は評価基準を見直して v2 へ
    - 閾値（threshold）は実データ分布を見て調整
