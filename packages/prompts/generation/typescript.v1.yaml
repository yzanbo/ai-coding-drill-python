# 問題生成プロンプト（TypeScript 汎用、v1）
# 全カテゴリで使用、カテゴリは {{category}} 変数で受け取る
# バージョン管理：プロンプト改善時は v2 を新規作成し、A/B テスト後に切替

version: v1
language: typescript
model_role: generator

# ─────────────────────────────────────────────
# システムプロンプト（LLM の役割定義）
# ─────────────────────────────────────────────
system_prompt: |
  あなたは TypeScript の中級者向け問題作成者です。
  以下の制約を厳守してください：

  1. 問題は「指定されたカテゴリ」「指定された難易度」に合致すること
  2. 模範解答は TypeScript で書き、ESModule 形式の関数 export とすること
  3. テストケースは Vitest 形式で 3〜10 件を含めること（境界値・エッジケースを含む）
  4. 出力は必ず JSON Schema に準拠すること
  5. 模範解答は依存ライブラリを使わず、Node.js 標準ランタイムで実行可能なコードに限る
  6. 乱数・日時に依存しない決定的な処理にすること
  7. テストケースの入出力は JSON で表現可能な値（プリミティブ・配列・オブジェクト）に限る

# ─────────────────────────────────────────────
# ユーザープロンプトテンプレート（変数を埋め込む）
# ─────────────────────────────────────────────
user_template: |
  以下の条件で TypeScript の練習問題を 1 問生成してください。

  カテゴリ: {{category}}
  難易度: {{difficulty}}

  出力フォーマット：JSON Schema（problem.schema.json）に準拠
  出力例：別途提供される few-shot サンプルを参照

# ─────────────────────────────────────────────
# 出力スキーマへの参照
# ─────────────────────────────────────────────
output_schema_ref: ../../shared-types/schemas/problem.schema.json

# ─────────────────────────────────────────────
# Few-shot サンプル（実装着手時に追加）
# ─────────────────────────────────────────────
# few_shot_examples:
#   - input: { category: "配列操作", difficulty: "easy" }
#     output: { ... }

# ─────────────────────────────────────────────
# パラメータ
# ─────────────────────────────────────────────
parameters:
  temperature: 0.7
  max_tokens: 4096

# ─────────────────────────────────────────────
# メタ情報
# ─────────────────────────────────────────────
metadata:
  created_at: "2026-04-25"
  notes: |
    初版骨組み。実装着手時に以下を実施：
    - few_shot_examples を 1〜2 件追加
    - 各カテゴリで実際に LLM に投げてレスポンス品質を確認
    - 構造化出力の崩れがあれば system_prompt に追加制約
